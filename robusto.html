                    <h3>Robusto</h3>
                    <p>This ceiling-mounted bar unit was designed during my internship in the Montreal-based
                        interior/product design company F&Y, for the Robusto, a pizzeria in Granby, Quebec. The purpose
                        of the unit is to store a total of 210 drinking glasses, as well as proudly displaying the
                        restaurant’s wine selection.
                    </p>
                    <p>It was designed with constant feedback from the lead designer of F&Y and the owners of the
                        restaurants, as well as frequent meetings with metalshop techs to ensure the final product would
                        be easy to manufacture and assemble.
                    </p>
